<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A simple vanilla JavaScript To‑Do List app with filters and localStorage."
    />
    <title>To‑Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="dark-app">
    <div class="page-shell">
      <a class="skip-link" href="#main">Skip to content</a>

      <header class="site-header">
        <div class="container header-inner">
          <div class="brand">
            <p class="brand-kicker">Vanilla JS</p>
            <h1 class="brand-title">To‑Do List</h1>
            <p class="brand-subtitle">Add, edit, complete, filter, and persist.</p>
          </div>
        </div>
      </header>

      <main id="main" class="container">
        <section class="card app" aria-label="To-do app">
          <form id="addForm" class="add-row" autocomplete="off">
            <label class="sr-only" for="newTodo">Add a task</label>
            <input
              id="newTodo"
              name="newTodo"
              type="text"
              inputmode="text"
              placeholder="What do you need to do?"
              maxlength="160"
              required
            />
            <div class="add-meta">
              <select id="newPriority" aria-label="Priority">
                <option value="high">High</option>
                <option value="medium" selected>Medium</option>
                <option value="low">Low</option>
              </select>
              <input
                id="newDueDate"
                type="date"
                aria-label="Due date (optional)"
              />
              <button class="button button-primary" type="submit">Add</button>
            </div>
          </form>

          <label class="search-row">
            <span class="sr-only">Search tasks</span>
            <input
              id="searchInput"
              type="search"
              placeholder="Search tasks…"
              autocomplete="off"
            />
          </label>

          <div
            class="progress"
            role="progressbar"
            id="progressBar"
            aria-valuenow="0"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-label="Task completion progress"
          >
            <div id="progressFill" class="progress-fill"></div>
            <span id="progressLabel" class="progress-label">0%</span>
          </div>

          <div class="toolbar" aria-label="Controls">
            <div class="toolbar-main">
              <div class="filters" role="group" aria-label="Filter tasks">
                <button type="button" class="chip" data-filter="all" aria-pressed="true">
                  All
                </button>
                <button type="button" class="chip" data-filter="active" aria-pressed="false">
                  Active
                </button>
                <button
                  type="button"
                  class="chip"
                  data-filter="completed"
                  aria-pressed="false"
                >
                  Completed
                </button>
              </div>

              <div class="stats-inline" aria-label="Task counts">
                <span>Remaining <strong id="remainingCount">0</strong></span>
                <span class="stat-sep" aria-hidden="true">·</span>
                <span>Total <strong id="totalCount">0</strong></span>
              </div>
            </div>

            <button id="clearCompleted" class="button button-ghost" type="button" disabled>
              Clear completed
            </button>
          </div>

          <div class="list-scroll" id="listScroll">
            <ul id="todoList" class="list" aria-label="Tasks"></ul>
            <p id="emptyState" class="empty" hidden>
              <svg
                class="empty-icon"
                aria-hidden="true"
                width="32"
                height="32"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="8" y="2" width="8" height="4" rx="1" />
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2" />
                <line x1="9" x2="15" y1="12" y2="12" />
                <line x1="9" x2="15" y1="16" y2="16" />
              </svg>
              <span id="emptyMessage">No tasks yet. Add one above to get started.</span>
            </p>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="container footer-inner">
          <p class="muted">Built with HTML, CSS, and JavaScript — no frameworks.</p>
          <a class="muted" href="#main">Back to top</a>
        </div>
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
